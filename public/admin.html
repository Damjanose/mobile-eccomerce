<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — MobileStore</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="/" class="nav-logo">📱 MobileStore</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/admin.html" class="active">Admin</a></li>
                <li>
                    <a href="/cart.html" class="cart-link">
                        🛒 Cart
                        <span class="cart-badge" id="cart-badge">0</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Login Form -->
    <div class="admin-login" id="admin-login">
        <h2>Admin Login</h2>
        <p class="error-msg" id="login-error"></p>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button class="btn btn-primary" id="login-btn" style="width:100%;margin-top:0.5rem;">Login</button>
    </div>

    <!-- Admin Dashboard (hidden until login) -->
    <div class="admin-container" id="admin-dashboard" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
            <h1>Admin Dashboard</h1>
            <button class="btn btn-secondary btn-small" id="logout-btn">Logout</button>
        </div>

        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="products">Products</button>
            <button class="admin-tab" data-tab="orders">Orders</button>
        </div>

        <div class="admin-panel">
            <!-- Products Section -->
            <div class="admin-section active" id="section-products">
                <h3 style="margin-bottom:1rem;">Add New Product</h3>
                <div class="admin-product-form" id="product-form">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="pf-name" placeholder="Phone name">
                    </div>
                    <div class="form-group">
                        <label>Brand</label>
                        <input type="text" id="pf-brand" placeholder="Brand">
                    </div>
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" id="pf-price" placeholder="0.00" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Stock</label>
                        <input type="number" id="pf-stock" placeholder="0">
                    </div>
                    <div class="form-group full-width">
                        <label>Description</label>
                        <textarea id="pf-description" rows="2" placeholder="Short description"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Image filename</label>
                        <input type="text" id="pf-image" placeholder="phone.jpg">
                    </div>
                    <div class="form-group" style="display:flex;align-items:flex-end;">
                        <button class="btn btn-primary" id="add-product-btn">Add Product</button>
                    </div>
                </div>

                <div id="product-message" class="message"></div>

                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Brand</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-tbody">
                    </tbody>
                </table>
            </div>

            <!-- Orders Section -->
            <div class="admin-section" id="section-orders">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Order #</th>
                            <th>Customer</th>
                            <th>Email</th>
                            <th>Total</th>
                            <th>Payment</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody">
                    </tbody>
                </table>
                <p id="no-orders" style="text-align:center;color:#888;padding:2rem;display:none;">No orders yet.</p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 MobileStore. School Project.</p>
    </footer>

    <script src="js/admin.js"></script>
</body>
</html>
