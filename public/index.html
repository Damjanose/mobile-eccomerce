<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="/" class="nav-logo">📱 MobileStore</a>
            <ul class="nav-links">
                <li><a href="/" class="active">Home</a></li>
                <li><a href="/admin.html">Admin</a></li>
                <li>
                    <a href="/cart.html" class="cart-link">
                        🛒 Cart
                        <span class="cart-badge" id="cart-badge">0</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>Welcome to MobileStore</h1>
        <p>Find the best smartphones at the best prices</p>
    </section>

    <section class="filters">
        <input type="text" id="search-input" placeholder="Search phones...">
        <select id="brand-filter">
            <option value="">All Brands</option>
        </select>
    </section>

    <main class="products-grid" id="products-grid">
        <!-- Products loaded dynamically -->
    </main>

    <footer class="footer">
        <p>&copy; 2026 MobileStore. School Project.</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
